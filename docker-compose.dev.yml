services:
  integrations_apis:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: integrations_apis
    image: integrations_apis
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - ./.env
    restart: unless-stopped
    init: true
    shm_size: '1gb'
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - integrations_apis_network
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: pnpm run start:dev

networks:
  integrations_apis_network:
    driver: bridge
