services:
  integrations_apis:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: integrations_apis
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - ./.env
    restart: unless-stopped
    networks:
      - integrations_apis_network

    volumes:
      - .:/app
      - /app/node_modules

    environment:
      - CHOKIDAR_USEPOLLING=true

    command: pnpm run start:dev

networks:
  integrations_apis_network:
    driver: bridge