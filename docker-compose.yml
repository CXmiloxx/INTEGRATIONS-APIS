services:
  integrations_apis:
    container_name: integrations_apis
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: integrations_apis:latest

    ports:
      - "${PORT}:3145"

    env_file:
      - .env

    restart: unless-stopped

    init: true
    shm_size: '1gb'

    networks:
      - integrations_apis_network

    environment:
      NODE_ENV: production

    command: node dist/main.js

    healthcheck:
      test:
        - CMD-SHELL
        - node -e "require('net').createConnection(3145,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  integrations_apis_network:
    driver: bridge
